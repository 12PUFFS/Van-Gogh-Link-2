<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Spartspro</title>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div class="header__logo">
          <a href="">
            <img src="/images/logo.svg" alt="header-logo" />
          </a>
        </div>
        <ul class="header__list">
          <li class="header__list__item">
            <a class="header__list__item__link" href="">Главная</a>
          </li>
          <li class="header__list__item">
            <a class="header__list__item__link" href="">Каталог</a>
          </li>
          <li class="header__list__item">
            <a class="header__list__item__link" href="">О компании</a>
          </li>
          <li class="header__list__item">
            <a class="header__list__item__link" href="">Оплата и доставка</a>
          </li>
          <li class="header__list__item">
            <a class="header__list__item__link" href="">Контакты</a>
          </li>
        </ul>
      </header>
      <main class="main">
        <section class="section__recomended">
          <div class="section__recomended__title">
            <h1>Рекомендуемое оборудование</h1>
          </div>
          <ul class="section__recomended__list">
            <li class="section__recomended__item">
              <img
                src="../../images/pic.png"
                alt=""
                class="section__recomended__list__img"
              />
              <div class="section__recomended__item__desc"></div>
            </li>
            <li class="section__recomended__item">
              <img
                src="../images/pic2.png"
                alt=""
                class="section__recomended__list__img"
              />
            </li>
            <li class="section__recomended__item">
              <img
                src="../images/pic3.png"
                alt=""
                class="section__recomended__list__img"
              />
            </li>
            <li class="section__recomended__item">
              <img
                src="../images/pic.png"
                alt=""
                class="section__recomended__list__img"
              />
            </li>
            <li class="section__recomended__item">
              <img
                src="../images/pic5.png"
                alt=""
                class="section__recomended__list__img"
              />
            </li>
            <li class="section__recomended__item">
              <img
                src="../images/pic6.png"
                alt=""
                class="section__recomended__list__img"
              />
            </li>
          </ul>
        </section>
        <button class="button__recomended">Перейти в каталог</button>
      </main>
    </div>
  </body>
</html>
